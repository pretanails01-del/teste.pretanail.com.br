<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dúvidas Frequentes | Preta Nails</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --rosa-brilhante: #ff2d92;
      --rosa-escuro: #C13584;
      --bg: #0a0a0a;
      --text: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* BOTÃO PRA ABRIR */
    #open-faq-btn {
      position: fixed; top: 20px; right: 25px; z-index: 9998;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,45,146,0.4);
      backdrop-filter: blur(10px); color: #fff; padding: 10px 18px; border-radius: 50px;
      text-decoration: none; font-weight: 700; font-size: 13px; display: inline-flex;
      align-items: center; gap: 8px; transition: all 0.2s; white-space: nowrap;
    }
    #open-faq-btn:active {
      background: linear-gradient(135deg, var(--rosa-brilhante) 0%, var(--rosa-escuro) 100%);
      transform: scale(0.96);
    }

    /* TELA CHEIA */
    #full-faq-screen {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #0a0a0a 0%, #000 100%);
      z-index: 99999; overflow-y: auto;
    }
    .full-faq-content {
      max-width: 900px; margin: 0 auto; padding: 40px 25px; min-height: 100vh;
    }
    .full-faq-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; position: sticky; top: 0; background: rgba(10,10,10,0.9);
      backdrop-filter: blur(10px); padding: 15px 0; z-index: 10;
    }
    #back-to-list, .close-full {
      background: none; border: 1px solid var(--rosa-brilhante); color: var(--rosa-brilhante);
      padding: 10px 18px; border-radius: 50px; font-weight: 700; cursor: pointer;
      transition: 0.3s; font-size: 14px;
    }
    #back-to-list:hover, .close-full:hover {
      background: var(--rosa-brilhante); color: #fff; transform: scale(1.05);
    }
    .full-faq-title {
      font-family: 'Playfair Display', serif; font-size: 28px;
      text-shadow: 0 0 15px rgba(255,45,146,0.5);
    }

    /* LISTA */
    .lista-duvidas li {
      cursor: pointer; padding: 18px 20px; margin-bottom: 12px;
      background: rgba(255,255,255,0.03); border-radius: 12px;
      border-left: 3px solid transparent;
      transition: all 0.3s ease;
      font-size: 15.8px; line-height: 1.6;
    }
    .lista-duvidas li:hover {
      border-left: 3px solid var(--rosa-brilhante);
      transform: translateX(8px);
      background: rgba(255,45,146,0.08);
      box-shadow: 0 0 20px rgba(255,45,146,0.2);
    }

    /* TÍTULOS */
    h2 { font-size: 26px!important; text-shadow: 0 0 12px rgba(255,45,146,0.6); margin-bottom: 20px; font-family: 'Playfair Display', serif; }
    h3 { color: #fff!important; font-size: 19px; border-left: 3px solid var(--rosa-brilhante); padding-left: 12px; margin-top: 25px; margin-bottom: 12px; }
    strong { color: var(--rosa-brilhante); }
    p { line-height: 1.9; margin-bottom: 15px; font-size: 15.5px; color: #ddd; }
    ul { margin-left: 20px; line-height: 2.2; }

    /* CAIXA DE RECADO VIP */
    .caixa-recado {
      background: linear-gradient(135deg, rgba(255, 45, 146, 0.2), rgba(0,0,0,0.5));
      border: 2px solid var(--rosa-brilhante);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 45, 146, 0.3), inset 0 0 10px rgba(255,45,146,0.1);
      padding: 20px; margin-top: 25px;
    }

    /* CABEÇALHO AUTORA */
    .autor-header {
      background: linear-gradient(135deg, rgba(255, 45, 146, 0.2), rgba(0,0,0,0.7));
      border: 2px solid var(--rosa-brilhante);
      box-shadow: 0 0 15px rgba(255,45,146,0.3);
      display:flex; align-items:center; gap:14px; margin-bottom:25px; padding:18px; border-radius:12px;
    }
    .autor-header img {
      width:55px; height:55px; border-radius:50%; border:3px solid #ff2d92; object-fit:cover;
      box-shadow:0 0 15px rgba(255,45,146,0.6);
    }

    /* BOTÃO FORMULÁRIO */
    .btn-form-full {
      display: inline-flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, var(--rosa-brilhante) 0%, var(--rosa-escuro) 100%);
      color: #fff; padding: 18px 35px; border-radius: 50px;
      text-decoration: none; font-weight: 800; font-size: 16px;
      box-shadow: 0 10px 30px rgba(255,45,146,0.5);
      margin-top: 30px;
      animation: pulse-rosa 2s infinite;
    }
    @keyframes pulse-rosa {
      0% { box-shadow: 0 0 0 0 rgba(255,45,146,0.5); }
      70% { box-shadow: 0 0 0 15px rgba(255,45,146,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,45,146,0); }
    }

    @media (max-width: 768px) {
      .full-faq-content { margin: 0; padding: 20px 15px; }
      .full-faq-title { font-size: 22px; }
      #back-to-list,.close-full { font-size: 13px; padding: 9px 14px; }
      #open-faq-btn { top: 15px; right: 16px; font-size: 12px; padding: 9px 16px; }
    }
    body.no-scroll { overflow: hidden; height: 100%; }
  </style>
</head>
<body>

  <!-- BOTÃO PRA ABRIR -->
  <a href="javascript:void(0)" id="open-faq-btn">
    <i class="fas fa-circle-question"></i> Dúvidas Frequentes
  </a>

  <!-- TELA CHEIA -->
  <div id="full-faq-screen">
    <div class="full-faq-content">
      <div class="full-faq-header">
        <button id="back-to-list" style="display:none;"><i class="fas fa-arrow-left"></i> Voltar</button>
        <h1 class="full-faq-title" id="full-title">Dúvidas Frequentes</h1>
        <button class="close-full"><i class="fas fa-times"></i> Fechar</button>
      </div>
      <div id="full-content"></div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const fullScreen = document.getElementById('full-faq-screen');
    const fullTitle = document.getElementById('full-title');
    const fullContent = document.getElementById('full-content');
    const closeFull = document.querySelector('.close-full');
    const backBtn = document.getElementById('back-to-list');
    const openBtn = document.getElementById('open-faq-btn');
    let isInList = true;

    const autorHeader = `
      <div class="autor-header">
        <img src="https://dl.dropboxusercontent.com/scl/fi/2adgfyuqpswr3czjicxcn/1783884486775_image_1783884486051.jpg?rlkey=96of3dejqt5w0b9m68tvo39mb&dl=0" alt="Sabrina Lemos">
        <div>
          <p style="margin:0; font-size:12px; color:#aaa;">Conteúdo e atendimento por</p>
          <p style="margin:2px 0 0 0; font-size:17px; font-weight:800;">Sabrina Lemos</p>
          <p style="margin:0; font-size:12px; color:#aaa;">Fundadora • Preta Nails</p>
        </div>
      </div>
    `;

    function showList() {
      isInList = true;
      backBtn.style.display = 'none';
      fullTitle.textContent = "Dúvidas Frequentes";
      fullContent.innerHTML = `
        ${autorHeader}
        <p style="margin-bottom:25px; font-size:16px; color:#fff;">Escolha uma dúvida e eu te explico tudinho com todo carinho:</p>
        <ul class="lista-duvidas" style="list-style:none;">
          <li onclick="loadFaq('Higienização')">• 1. Como funciona a higienização e esterilização?</li>
          <li onclick="loadFaq('Sou gestante')">• 2. Sou gestante, posso fazer alongamento?</li>
          <li onclick="loadFaq('Site seguro')">• 3. Seu site é seguro? Meus dados estão protegidos?</li>
          <li onclick="loadFaq('Formulario')">• 4. Por que preencher o formulário de avaliação?</li>
          <li onclick="loadFaq('Sinais de alergia')">• 5. Sinais de alergia e como eu previno</li>
          <li onclick="loadFaq('Cuidados com a unha')">• 6. Cuidados completos após o alongamento</li>
          <li onclick="loadFaq('Dica semanal')">• 7. Dica semanal da Preta Nails</li>
        </ul>
        <div style="text-align:center;">
          <a href="fichadeassinatura.html" class="btn-form-full"><i class="fas fa-clipboard-list"></i> PREENCHER FORMULÁRIO E INICIAR</a>
        </div>`;
    }

    window.loadFaq = function(title) {
      isInList = false;
      backBtn.style.display = 'inline-block';
      fullTitle.textContent = title;

      if(title === 'Higienização'){
        fullContent.innerHTML = `${autorHeader}<h2>HIGIENIZAÇÃO E ESTERILIZAÇÃO NA PRETA NAILS</h2><p><strong>Oi, linda 💖 Aqui é a Sabrina.</strong></p><p>Segurança é prioridade máxima aqui. Todos os alicates passam por: <strong>Lavagem > Secagem > Estufa 180°C por 1 hora.</strong> Lixas descartáveis. Bancada limpa com álcool 70%.</p><div class="caixa-recado"><strong>RECADO DA PRETA:</strong><br>Fica tranquila. Higiene não é luxo, é obrigação 💖</div>`;
      } 
      else if(title === 'Formulario'){
        fullContent.innerHTML = `${autorHeader}<h2>POR QUE PEDIMOS O FORMULÁRIO DE AVALIAÇÃO INICIAL?</h2><p><strong>Oi, linda 💖 Aqui é a Sabrina.</strong></p><p>Leva só 2 minutinhos e faz toda diferença pra sua segurança e pro resultado ficar perfeito.</p><h3>1. SUA SEGURANÇA EM PRIMEIRO LUGAR</h3><p>Preciso saber de alergias, diabetes e medicamentos pra escolher os produtos certos.</p><h3>2. PERSONALIZAR SEU ATENDIMENTO</h3><p>Formato, comprimento e técnica ideal pra você. Assim não perdemos tempo.</p><div class="caixa-recado"><strong>RECADO DA PRETA:</strong><br>É pra te cuidar melhor 💖</div><div style="text-align:center;"><a href="fichadeassinatura.html" class="btn-form-full"><i class="fas fa-clipboard-list"></i> PREENCHER FORMULÁRIO AGORA</a></div>`;
      }
      else if(title === 'Sou gestante'){ fullContent.innerHTML = `${autorHeader}<h2>GESTANTE PODE FAZER ALONGAMENTO?</h2><p><strong>Oi, mamãe 💖 SIM, PODE SIM!</strong></p><p>É Fibra de Vidro. Zero radiação. Produtos Anvisa. Ambiente arejado.</p><div class="caixa-recado"><strong>RECADO DA PRETA:</strong><br>Você merece se cuidar também 💖</div>`; }
      else if(title === 'Site seguro'){ fullContent.innerHTML = `${autorHeader}<h2>SEU SITE É SEGURO?</h2><p><strong>Oi, linda 💖 SIM, 100% SEGURO.</strong></p><p>Tem certificado SSL, cadeado verde. Seus dados vão direto pro meu Whats. LGPD.</p><div class="caixa-recado"><strong>RECADO DA PRETA:</strong><br>Sua segurança é prioridade 💖</div>`; }
      else if(title === 'Sinais de alergia'){ fullContent.innerHTML = `${autorHeader}<h2>SINAIS DE ALERGIA</h2><p><strong>Oi, linda 💖</strong></p><p>É rara, menos de 1%. Fique atenta: coceira, vermelhidão, inchaço nos 3 primeiros dias.</p><h3>O QUE FAZER?</h3><p>Me chama no Whats. Removemos sem custo.</p><div class="caixa-recado"><strong>IMPORTANTE:</strong><br>Sua saúde em primeiro lugar 💖</div>`; }
      else if(title === 'Cuidados com a unha'){ fullContent.innerHTML = `${autorHeader}<h2>CUIDADOS APÓS O ALONGAMENTO</h2><p><strong>Oi, linda 💅</strong></p><p>1. Evite água quente 2 dias<br>2. Óleo de cutícula todo dia<br>3. Nunca tire em casa</p><div class="caixa-recado"><strong>RECADO FINAL:</strong><br>Seguindo isso dura 25 dias lindas 💖</div>`; }
      else if(title === 'Dica semanal'){ fullContent.innerHTML = `${autorHeader}<h2>DICA SEMANAL #1</h2><div class="caixa-recado" style="text-align:center; font-size:18px;"><strong>Óleo de cutícula todo dia antes de dormir</strong></div><p>Evita que levante, dá brilho e fortalece sua unha natural.</p>`; }
    };

    // CORREÇÃO: APENAS 1 EVENTO DE CLIQUE
    openBtn.addEventListener('click', function(e) {
      e.preventDefault();
      fullScreen.style.display = 'block';
      document.body.classList.add('no-scroll');
      showList();
    });

    backBtn.addEventListener('click', () => showList());
    closeFull.addEventListener('click', () => {
      fullScreen.style.display = 'none';
      document.body.classList.remove('no-scroll');
    });
  </script>

</body>
</html>
