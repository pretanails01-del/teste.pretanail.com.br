<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Avaliação Inicial • Preta NailS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root { 
    --primary: #C13584; 
    --primary-dark: #a02c6e; 
    --success: #25D366; 
    --bg: #0a0a0a;
    --card: rgba(255,255,255,0.04);
    --text: #ffffff; 
    --border: rgba(193,53,132,0.25);
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Inter', sans-serif; 
    background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%); 
    min-height: 100vh; 
    padding: 12px; /* 1. DIMINUI: era 20px */
    color: var(--text); 
    -webkit-font-smoothing: antialiased; 
  }
  
  .container { 
    max-width: 720px; 
    margin: 16px auto; /* 2. DIMINUI: era 40px auto */
    background: var(--card); 
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    border-radius: 16px; /* 3. DIMINUI: era 24px */
    box-shadow: 0 20px 60px rgba(0,0,0,0.6); /* sombra menor */
    overflow: hidden; 
    animation: slideUp 0.6s ease; 
  }

  /* NOVO: Ajuste específico pra mobile */
  @media (max-width: 768px) {
    body {
      padding: 8px; /* quase grudado nas bordas */
    }
    .container {
      margin: 8px auto; /* cabeçalho cola mais no topo */
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
