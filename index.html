<html lang="pt-BR">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --primary: #C13584;
      --primary-dark: #a02c6e;
      --bg: #0a0a0a;
      --text: #ffffff;
      --whatsapp: #25D366;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* BOTÃO DÚVIDAS FREQUENTES NO TOPO DIREITO */
    .btn-faq-top {
      position: absolute;
      top: 25px;
      right: 25px;
      background: rgba(0,0,0,0.8);
      border: 2px solid var(--primary);
      color: #fff;
      padding: 12px 22px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .btn-faq-top:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    /* TELA INTEIRA PROFISSIONAL */
    .full-faq-screen {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a0a;
      z-index: 3000;
      overflow-y: auto;
      padding: 20px;
    }
    .full-faq-content {
      max-width: 820px;
      margin: 40px auto;
      background: #111;
      border: 1px solid var(--primary);
      border-radius: 20px;
      padding: 40px 30px;
    }
    .full-faq-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(193,53,132,0.4);
    }
    .full-faq-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--primary);
    }
    .close-full {
      font-size: 36px;
      cursor: pointer;
      color: #ccc;
    }
    .full-author {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 40px;
      padding-top: 25px;
      border-top: 1px solid rgba(193,53,132,0.3);
    }
    .full-author img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid var(--primary);
    }

    .hero { min-height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1604654894610-df63bc536371?q=80&w=1887&auto=format&fit=crop') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; position: relative; }
    .wrap { max-width: 600px; animation: fadeIn 1s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .coroa { font-size: 40px; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(193,53,132,0.5)); }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(48px, 8vw, 72px); font-weight: 900; line-height: 1; margin: 0; }
    h1 span { color: var(--primary); }
    .slogan { font-size: 13px; letter-spacing: 4px; margin: 12px 0 30px; opacity: 0.7; font-weight: 600; }
    .tag { border: 1px solid var(--primary); border-radius: 50px; padding: 12px 24px; display: inline-block; font-weight: 700; font-size: 14px; margin-bottom: 20px; background: rgba(193,53,132,0.1); }
    .destaque { font-family: 'Playfair Display', serif; font-size: clamp(56px, 10vw, 80px); font-weight: 900; color: var(--primary); line-height: 0.9; }
    .destaque small { font-size: 32px; font-style: italic; color: #fff; display: block; line-height: 1.2; font-weight: 400; }

    .btn { position: relative; overflow: hidden; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 18px 30px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 16px; display: inline-flex; align-items: center; gap: 12px; margin-top: 30px; box-shadow: 0 10px 30px rgba(193,53,132,0.4); transition: all 0.3s; border: none; cursor: pointer; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(193,53,132,0.6); }
    .btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: glitter 2.5s infinite;
    }
    @keyframes glitter { 0% { left: -100%; } 100% { left: 200%; } }

    .social-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
    .btn-social { background: rgba(255,255,255,0.06); border: 1px solid rgba(193,53,132,0.3); color: #fff; padding: 12px 18px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; backdrop-filter: blur(10px); }
    .btn-social:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-2px); }

    .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: var(--primary); font-size: 24px; animation: bounce 2s infinite; opacity: 0.8; }
    @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateX(-50%) translateY(0); } 40% { transform: translateX(-50%) translateY(-10px); } 60% { transform: translateX(-50%) translateY(-5px); } }

    .galeria { padding: 40px 20px 100px 20px; background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%); }
    .titulo-galeria { text-align: center; margin-bottom: 60px; }
    .titulo-galeria h2 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 48px); }
    .titulo-galeria h2 span { color: var(--primary); }

    .swiper { max-width: 900px; margin: auto; padding: 20px 0 70px 0; }
    
    .card-glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(193,53,132,0.25);
      border-radius: 25px;
      backdrop-filter: blur(20px);
      padding: 20px;
      transition: all 0.4s;
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
    }
    .card-glass:hover { border-color: var(--primary); transform: translateY(-10px); }
    
    .card-glass img {
      width: 100%;
      height: auto;
      max-height: 650px;
      object-fit: contain;
      border-radius: 18px;
      display: block;
      background: #000;
    }

    .swiper-button-next, .swiper-button-prev { 
      color: var(--primary) !important; 
      background: rgba(0,0,0,0.6); 
      width: 55px; height: 55px; 
      border-radius: 50%; 
      border: 1.5px solid var(--primary);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }
    .swiper-button-next:hover, .swiper-button-prev:hover { background: var(--primary); color: #fff !important; }
    .swiper-button-next:after, .swiper-button-prev:after { font-size: 20px !important; font-weight: 900; }
    .swiper-pagination-bullet { background: rgba(255,255,255,0.3) !important; width: 12px; height: 12px; }
    .swiper-pagination-bullet-active { background: var(--primary) !important; }

    .desconto-wrap {
      max-width: 600px; margin: 0 auto 80px; padding: 40px 30px; text-align: center;
      background: linear-gradient(135deg, rgba(193,53,132,0.22) 0%, rgba(160,44,110,0.15) 100%);
      border: 2px solid var(--primary);
      border-radius: 25px;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 50px rgba(193,53,132,0.3);
    }
    .desconto-wrap .tag-vip {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border: none; color: #fff; font-size: 13px; letter-spacing: 3px; padding: 8px 20px; border-radius: 50px;
    }
    .desconto-wrap h3 {
      font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 36px);
      color: var(--primary); margin: 20px 0 15px; line-height: 1.1;
    }
    .desconto-wrap p {
      font-size: 15.5px; opacity: 0.95; line-height: 1.7; margin-bottom: 28px;
    }

    .foto-destaque-wrap {
      max-width: 400px; margin: 0 auto 100px; padding: 30px 25px; text-align: center;
      background: linear-gradient(135deg, rgba(193,53,132,0.15) 0%, rgba(160,44,110,0.1) 100%);
      border: 1px solid rgba(193,53,132,0.3);
      border-radius: 25px;
      backdrop-filter: blur(20px);
      box-shadow: 0 15px 50px rgba(193,53,132,0.2);
    }
    .foto-destaque-wrap img {
      width: 160px; height: 160px; border-radius: 50%;
      border: 3px solid var(--primary);
      box-shadow: 0 0 40px rgba(193,53,132,0.5);
      object-fit: cover; margin-bottom: 20px;
    }
    .foto-destaque-wrap h3 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--primary); margin-bottom: 12px; }
    .foto-destaque-wrap p { margin-top: 0; font-size: 14px; opacity: 0.9; line-height: 1.7; }

    .footer { background: #050505; border-top: 1px solid rgba(193,53,132,0.2); padding: 50px 20px 30px; text-align: center; }
    .footer-selos { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
    .selo { background: rgba(193,53,132,0.08); border: 1px solid rgba(193,53,132,0.3); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; }
    .selo i { color: var(--primary); font-size: 18px; }
    .footer p { font-size: 12px; opacity: 0.5; margin-top: 15px; }

    .whatsapp-float { position: fixed; bottom: 80px; right: 25px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 6px; text-decoration: none; }
    .whatsapp-btn { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; box-shadow: 0 8px 25px rgba(193,53,132,0.5); transition: all 0.3s; animation: pulse 2s infinite; }
    .whatsapp-btn:hover { transform: scale(1.1); box-shadow: 0 12px 35px rgba(193,53,132,0.7); }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(193,53,132,0.6); }
      70% { box-shadow: 0 0 0 15px rgba(193,53,132,0); }
      100% { box-shadow: 0 0 0 0 rgba(193,53,132,0); }
    }
    .whatsapp-text { font-size: 10px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(10px); letter-spacing: 0.5px; text-align: center; }

    @media (max-width: 768px) {
      .btn-faq-top { top: 18px; right: 18px; padding: 10px 16px; font-size: 13px; }
      .hero { min-height: 85vh; padding: 20px 16px 40px 16px; }
      .wrap { max-width: 100%; }
      .slogan { letter-spacing: 2px; font-size: 11px; }
      .tag { font-size: 12px; padding: 10px 20px; }
      .coroa { font-size: 32px; margin-bottom: 10px; }
      h1 { font-size: clamp(36px, 10vw, 48px); }
      .destaque { font-size: clamp(40px, 12vw, 56px); }
      .destaque small { font-size: 24px; }
      .btn { width: 100%; justify-content: center; margin-top: 20px; padding: 16px 24px; font-size: 15px; }
      .social-btns { flex-direction: column; }
      .btn-social { width: 100%; justify-content: center; }
      .scroll-down { bottom: 15px; font-size: 20px; }
      .galeria { padding: 30px 16px 80px 16px; }
      .card-glass img { max-height: 500px; }
      .swiper-button-next, .swiper-button-prev { width: 35px; height: 35px; }
      .swiper-button-next:after, .swiper-button-prev:after { font-size: 14px !important; }
      .whatsapp-float { bottom: 70px; right: 20px; }
      .whatsapp-btn { width: 55px; height: 55px; font-size: 28px; }
      .foto-destaque-wrap { margin: 0 16px 80px; padding: 25px 20px; }
      .desconto-wrap { margin: 0 16px 80px; padding: 30px 20px; }
    }
  </style>
</head>

    /* FUNDO GLITTER 3D ANIMADO */
.glitter-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(255,45,146,0.15) 0%, transparent 50%),

    @keyframes glitterMove {
      0%, 100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-10px, -10px) scale(1.05); }
