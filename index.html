    .tag { border: 1px solid var(--primary); border-radius: 50px; padding: 12px 24px; display: inline-block; font-weight: 700; font-size: 14px; margin-bottom: 20px; background: rgba(193,53,132,0.1); }
    .destaque { font-family: 'Playfair Display', serif; font-size: clamp(56px, 10vw, 80px); font-weight: 900; color: var(--primary); line-height: 0.9; }

    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(193,53,132,0.6); }

    .social-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
    .btn-social { background: rgba(255,255,255,0.06); border: 1px solid rgba(193,53,132,0.3); color: #fff; padding: 12px 18px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; backdrop-filter: blur(10px); }
    .btn-social:hover { background: var(--primary); border-color: var(--primary); transform: translateY(-2px); }

    .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: var(--primary); font-size: 24px; animation: bounce 2s infinite; opacity: 0.8; }
    @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateX(-50%) translateY(0); } 40% { transform: translateX(-50%) translateY(-10px); } 60% { transform: translateX(-50%) translateY(-5px); } }

    .galeria { padding: 40px 20px 100px 20px; background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%); }
    .titulo-galeria { text-align: center; margin-bottom: 60px; }
    .titulo-galeria h2 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 48px); }
    .titulo-galeria h2 span { color: var(--primary); }

    .swiper { max-width: 900px; margin: auto; padding: 20px 0 70px 0; }
    .card-glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(193,53,132,0.25); border-radius: 25px; backdrop-filter: blur(20px); padding: 20px; transition: all 0.4s; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
    .card-glass:hover { border-color: var(--primary); transform: translateY(-10px); }
    .card-glass img { width: 100%; height: auto; max-height: 650px; object-fit: contain; border-radius: 18px; display: block; background: #000; }

    .desconto-wrap, .foto-destaque-wrap { max-width: 600px; margin: 0 auto 80px; padding: 35px 30px; text-align: center; background: linear-gradient(135deg, rgba(193,53,132,0.18) 0%, rgba(160,44,110,0.12) 100%); border: 1px solid rgba(193,53,132,0.4); border-radius: 25px; backdrop-filter: blur(20px); box-shadow: 0 15px 50px rgba(193,53,132,0.25); }

    .footer { background: #050505; border-top: 1px solid rgba(193,53,132,0.2); padding: 50px 20px 30px; text-align: center; }
    .footer-selos { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
    .selo { background: rgba(193,53,132,0.08); border: 1px solid rgba(193,53,132,0.3); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 600; }

    .whatsapp-btn { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; box-shadow: 0 8px 25px rgba(193,53,132,0.5); animation: pulse 2s infinite; }

    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(193,53,132,0.6); } 70% { box-shadow: 0 0 0 15px rgba(193,53,132,0); } 100% { box-shadow: 0 0 0 0 rgba(193,53,132,0); } }

  <!-- ==================== ANTI-INSPEÇÃO AVANÇADA ==================== -->
  <script>
  (function() {
    "use strict";

    // Desativa bloqueio no Visual Studio Code / localhost
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
      console.log("%c🔧 Modo Desenvolvimento Ativado - Bloqueio Desativado", "color:#C13584; font-weight:bold");
      return;
    }

    let attempts = 0;

    // Bloqueio Avançado de Teclas
    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' || 
          (e.ctrlKey && e.shiftKey && ['I','C','J','K'].includes(e.key.toUpperCase())) ||
          (e.ctrlKey && ['u','s','p'].includes(e.key.toLowerCase()))) {
        
        attempts++;
        e.preventDefault();
        e.stopImmediatePropagation();

        if (attempts % 3 === 0) {
          alert('🔄 Muitas tentativas de inspeção detectadas. Recarregando...');
          window.location.reload();
          return;
        }

        alert('🔒 Esta ação foi bloqueada por motivos de segurança.');
      }
    }, true);

    // Botão direito TOTALMENTE LIBERADO
    // (você pode copiar texto normalmente)

    // Detecção Avançada de DevTools
    setInterval(() => {
      const widthDiff = window.outerWidth - window.innerWidth;
      const heightDiff = window.outerHeight - window.innerHeight;

      if (widthDiff > 120 || heightDiff > 120) {
        attempts++;
        console.clear();
        if (attempts % 3 === 0) {
          alert('🔄 Recarregando por detecção de ferramentas de desenvolvedor...');
          window.location.reload();
        }
      }
    }, 300);

    // Limpeza constante do console
    setInterval(() => { console.clear(); }, 500);

  })();
  </script>
