
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preta NailS | Beleza • Confiança • Poder</title>
  
  <!-- Fonts e Ícones -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --primary: #C13584;
      --primary-dark: #a02c6e;
      --bg: #0a0a0a;
      --text: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* Botão ADM no canto */
    .header-adm { position: fixed; top: 15px; right: 20px; z-index: 1000; }
    .btn-adm { color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 6px; backdrop-filter: blur(10px); transition: all 0.3s; display: flex; gap: 6px; align-items: center; }
    .btn-adm:hover { color: var(--primary); border-color: var(--primary); background: rgba(193,53,132,0.1); }

    /* Hero - Tela principal */
    .hero { min-height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1604654894610-df63bc536371?q=80&w=1887&auto=format&fit=crop') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .wrap { max-width: 600px; animation: fadeIn 1s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .coroa { font-size: 40px; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(193,53,132,0.5)); }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(48px, 8vw, 72px); font-weight: 900; line-height: 1; margin: 0; }
    h1 span { color: var(--primary); }
    .slogan { font-size: 13px; letter-spacing: 4px; margin: 12px 0 30px; opacity: 0.7; font-weight: 600; }
    .tag { border: 1px solid var(--primary); border-radius: 50px; padding: 12px 24px; display: inline-block; font-weight: 700; font-size: 14px; margin-bottom: 20px; background: rgba(193,53,132,0.1); }
    .destaque { font-family: 'Playfair Display', serif; font-size: clamp(56px, 10vw, 80px); font-weight: 900; color: var(--primary); line-height: 0.9; }
    .destaque small { font-size: 32px; font-style: italic; color: #fff; display: block; line-height: 1.2; font-weight: 400; }

    /* Botão principal */
    .btn { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 18px 30px; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 16px; display: inline-flex; align-items: center; gap: 12px; margin-top: 30px; box-shadow: 0 10px 30px rgba(193,53,132,0.4); transition: all 0.3s; border: none; cursor: pointer; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(193,53,132,0.6); }

    /* Mobile */
    @media (max-width: 600px) {
      .slogan { letter-spacing: 2px; font-size: 11px; }
      .tag { font-size: 12px; padding: 10px 20px; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <!-- Botão ADM -->
  <div class="header-adm">
    <a href="agendamento.html" class="btn-adm"> <!-- CORRIGIDO AQUI -->
      <i class="fas fa-lock"></i> Meu cantinho ❤️
    </a>
  </div>

  <!-- Catálogo Principal -->
  <section class="hero">
    <div class="wrap">
      <div class="coroa">👑</div>
      <h1>PRETA<span>NAILS</span></h1>
      <div class="slogan">BELEZA • CONFIANÇA • PODER</div>
      <div class="tag">ALONGAMENTO FIBRA DE VIDRO</div>
      <div class="destaque">
        MELHOR<br><small>versão! ♡</small>
      </div>
      
      <!-- Botão que leva pro teu form -->
      <a href="fichadeassinatura.html" class="btn">
        QUERO MINHAS UNHAS PERFEITAS 
        <i class="fas fa-arrow-right"></i>
      </a>
    </div>
  </section>
</body>
</html>
